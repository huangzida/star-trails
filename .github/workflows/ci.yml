name: CI

# 这样它就只支持手动点击运行，不再自动触发 push/pr
# on: [workflow_dispatch] 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # 允许在 GitHub 界面点击 "Run workflow"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
